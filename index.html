<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Hkeeli - Lebanese Arabic</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Hkeeli">
<meta name="theme-color" content="#14555A">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<style>
  :root{
    --cream:#FAF5EC;
    --card:#FFFFFF;
    --ink:#22303A;
    --ink-soft:#66707A;
    --terracotta:#C1440E;
    --teal:#14555A;
    --teal-bright:#1E7F86;
    --gold:#E0A526;
    --olive:#7A8B3A;
    --plum:#8E4A6B;
    --blue:#3A6EA5;
    --green-ok:#2FA95C;
    --red-bad:#E0533D;
    --line:#ECE4D4;
    --shadow: 0 4px 16px rgba(34,48,58,0.10);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html,body{
    margin:0; padding:0; height:100%;
    background:var(--cream);
    color:var(--ink);
    font-family:-apple-system, BlinkMacSystemFont, "SF Pro Rounded", "SF Pro Text", Segoe UI, Roboto, sans-serif;
    overscroll-behavior:none;
  }
  #app{
    max-width:480px; margin:0 auto; min-height:100vh;
    display:flex; flex-direction:column;
    padding-bottom: env(safe-area-inset-bottom);
  }
  .screen{ display:none; flex-direction:column; flex:1; animation: fadein .25s ease; }
  .screen.active{ display:flex; }
  @keyframes fadein{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:none;} }
  @keyframes pop{ 0%{transform:scale(0.8);} 60%{transform:scale(1.06);} 100%{transform:scale(1);} }
  @keyframes shake{ 0%,100%{transform:translateX(0);} 25%{transform:translateX(-6px);} 75%{transform:translateX(6px);} }
  @keyframes pulse{ 0%,100%{transform:scale(1);} 50%{transform:scale(1.08);} }

  /* ============ HOME ============ */
  .hero{
    background: linear-gradient(135deg, var(--teal) 0%, var(--teal-bright) 100%);
    color:#fff;
    padding: calc(env(safe-area-inset-top) + 18px) 20px 22px;
    border-radius: 0 0 26px 26px;
    box-shadow: var(--shadow);
  }
  .hero-top{ display:flex; align-items:center; justify-content:space-between; }
  .brand{ font-weight:800; font-size:21px; letter-spacing:.01em; }
  .brand small{ display:block; font-size:12px; font-weight:600; opacity:.75; margin-top:2px;}
  .hero-stats{ display:flex; gap:8px; margin-top:14px; }
  .hstat{
    flex:1; background:rgba(255,255,255,0.13); border-radius:14px; padding:10px 8px;
    text-align:center; backdrop-filter: blur(4px);
  }
  .hstat .v{ font-size:18px; font-weight:800; }
  .hstat .l{ font-size:10px; font-weight:700; opacity:.8; letter-spacing:.05em; }
  .goal-ring-wrap{ display:flex; align-items:center; gap:12px; margin-top:14px; background:rgba(255,255,255,0.13); border-radius:14px; padding:10px 14px;}
  .goal-text{ font-size:13px; font-weight:700; }
  .goal-text small{ display:block; font-weight:500; opacity:.8; font-size:11px; margin-top:1px;}
  .practice-btn{
    margin:14px 18px 0; padding:13px; border:none; border-radius:14px;
    background:var(--card); color:var(--teal); font-size:15px; font-weight:800;
    box-shadow:var(--shadow); cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px;
  }
  .practice-btn:disabled{ opacity:.5; }
  .home-scroll{ flex:1; overflow-y:auto; padding: 8px 18px 110px; }

  .unit-block{ margin: 26px 0 6px; }
  .unit-header{
    color:#fff; border-radius:18px;
    padding:14px 18px; margin-bottom:22px; box-shadow:var(--shadow);
    display:flex; align-items:center; gap:12px;
  }
  .unit-header .uicon{ font-size:28px; }
  .unit-header h2{ margin:0 0 2px; font-size:16px; }
  .unit-header p{ margin:0; font-size:12px; opacity:.85; }
  .unit-progress{ margin-left:auto; font-size:12px; font-weight:800; background:rgba(255,255,255,.2); border-radius:10px; padding:4px 9px; white-space:nowrap;}
  .path{ display:flex; flex-direction:column; align-items:center; gap:24px; }
  .path-node{ display:flex; flex-direction:column; align-items:center; gap:7px; }
  .node{
    width:66px; height:66px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:24px; color:#fff;
    border:none; position:relative; cursor:pointer;
    box-shadow: 0 5px 0 rgba(0,0,0,0.18), var(--shadow);
    transition: transform .12s ease;
  }
  .node:active{ transform:translateY(3px); box-shadow: 0 2px 0 rgba(0,0,0,0.18), var(--shadow); }
  .node.locked{ background:#D8D2C4 !important; box-shadow:0 5px 0 rgba(0,0,0,0.08); }
  .node.current{ animation:pulse 2s ease infinite; }
  .node .stars{ position:absolute; bottom:-11px; font-size:10px; background:#fff; border-radius:10px; padding:2px 7px; color:var(--ink); box-shadow:var(--shadow); font-weight:700; letter-spacing:-1px;}
  .node-label{ font-size:12px; font-weight:800; color:var(--ink-soft); text-align:center; max-width:180px; line-height:1.5;}
  .node-label .words{ font-weight:500; font-size:11px; }

  /* ============ LESSON ============ */
  .lesson-header{
    display:flex; align-items:center; gap:12px;
    padding: calc(env(safe-area-inset-top) + 14px) 16px 12px;
  }
  .close-btn{ background:none; border:none; font-size:22px; color:var(--ink-soft); cursor:pointer; padding:4px 8px; }
  .progress-track{ flex:1; height:16px; background:var(--line); border-radius:9px; overflow:hidden; }
  .progress-fill{ height:100%; background:linear-gradient(90deg, var(--green-ok), #55C47E); border-radius:9px; transition:width .35s ease; }
  .hearts{ display:flex; align-items:center; gap:3px; font-weight:800; color:var(--red-bad); font-size:15px; white-space:nowrap; }

  .quiz-body{ flex:1; padding:8px 20px 20px; display:flex; flex-direction:column; overflow-y:auto;}
  .prompt-label{ font-size:13px; font-weight:800; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.05em; margin-bottom:14px;}
  .prompt-main{ display:flex; flex-direction:column; align-items:flex-start; gap:6px; margin-bottom:22px;}
  .prompt-row{ display:flex; align-items:center; gap:12px; }
  .arabic-big{ font-size:40px; font-weight:700; direction:rtl; }
  .translit{ font-size:16px; color:var(--ink-soft); font-style:italic; }
  .english-big{ font-size:26px; font-weight:800; }
  .speak-btn{
    display:flex; align-items:center; justify-content:center;
    width:60px; height:60px; border-radius:20px; background:var(--teal-bright); color:#fff;
    border:none; font-size:26px; box-shadow:var(--shadow); cursor:pointer;
  }
  .speak-btn:active{ transform:scale(0.93); }
  .speak-btn.slow{ width:46px; height:46px; font-size:19px; border-radius:16px; background:var(--gold); }
  .listen-controls{ display:flex; align-items:center; justify-content:center; gap:12px; width:100%; margin-bottom:8px;}
  .mini-speak{
    display:inline-flex; align-items:center; justify-content:center;
    width:34px; height:34px; border-radius:50%; background:var(--teal-bright); color:#fff;
    border:none; font-size:15px; flex-shrink:0; cursor:pointer;
  }
  .mini-speak:active{ transform:scale(0.9); }

  .teach-card{
    background:var(--card); border-radius:22px; padding:30px 22px 26px;
    box-shadow:var(--shadow); display:flex; flex-direction:column; align-items:center; gap:10px;
    text-align:center; margin-top:8px; animation:pop .3s ease;
  }
  .teach-badge{
    background:linear-gradient(90deg, var(--gold), #F2BE4A); color:#fff; font-size:12px; font-weight:800;
    letter-spacing:.08em; padding:5px 14px; border-radius:12px;
  }
  .teach-arabic{ font-size:54px; font-weight:700; direction:rtl; margin-top:6px; }
  .teach-translit{ font-size:22px; color:var(--teal-bright); font-weight:800; font-style:italic; }
  .teach-english{ font-size:18px; color:var(--ink-soft); font-weight:600; }
  .teach-tip{ font-size:13px; color:var(--ink-soft); margin-top:8px; line-height:1.5;}

  .options{ display:flex; flex-direction:column; gap:12px; }
  .option{
    background:var(--card); border:2px solid var(--line); border-radius:16px;
    padding:14px 16px; font-size:17px; font-weight:600; text-align:left;
    cursor:pointer; display:flex; flex-direction:row; align-items:center; justify-content:space-between; gap:10px;
    box-shadow: 0 2px 0 var(--line);
  }
  .option .opt-text{ display:flex; flex-direction:column; gap:2px; }
  .option .opt-sub{ font-size:13px; font-weight:400; color:var(--ink-soft); font-style:italic; direction:rtl; text-align:left;}
  .option .opt-tr{ font-size:18px; font-weight:800; color:var(--teal); font-style:italic; }
  .option.selected{ border-color:var(--teal-bright); background:#EAF5F4; box-shadow:0 2px 0 var(--teal-bright); }
  .option.correct{ border-color:var(--green-ok); background:#E8F7EC; box-shadow:0 2px 0 var(--green-ok); animation:pop .3s ease;}
  .option.wrong{ border-color:var(--red-bad); background:#FCEAE6; box-shadow:0 2px 0 var(--red-bad); animation:shake .3s ease;}

  /* matching game */
  .match-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .match-card{
    background:var(--card); border:2px solid var(--line); border-radius:14px;
    padding:13px 8px; text-align:center; font-weight:700; cursor:pointer; font-size:15px;
    min-height:60px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px;
    box-shadow: 0 2px 0 var(--line);
  }
  .match-card .m-ar{ direction:rtl; font-size:20px; }
  .match-card .m-tr{ font-size:11px; color:var(--ink-soft); font-style:italic; font-weight:500;}
  .match-card.picked{ border-color:var(--teal-bright); background:#EAF5F4; }
  .match-card.matched{ border-color:var(--green-ok); background:#E8F7EC; opacity:.55; pointer-events:none; }
  .match-card.wrongflash{ border-color:var(--red-bad); background:#FCEAE6; animation:shake .3s ease; }

  .type-input{
    width:100%; font-size:20px; padding:14px 16px; border-radius:16px;
    border:2px solid var(--line); font-family:inherit; margin-bottom:10px;
  }
  .type-input:focus{ outline:none; border-color:var(--teal-bright); }
  .hint{ font-size:13px; color:var(--ink-soft); margin-bottom:14px; }

  .footer-bar{
    padding:14px 20px calc(env(safe-area-inset-bottom) + 14px);
    background:var(--cream);
  }
  .btn-primary{
    width:100%; padding:16px; border:none; border-radius:16px;
    background: #D8D2C4; color:#fff; font-size:17px; font-weight:800; letter-spacing:.03em;
    cursor:not-allowed; box-shadow: 0 4px 0 rgba(0,0,0,0.10);
  }
  .btn-primary.ready{ background:var(--green-ok); cursor:pointer; box-shadow: 0 4px 0 #1F7A40; }
  .btn-primary.ready:active{ transform:translateY(2px); box-shadow: 0 2px 0 #1F7A40;}
  .btn-primary.wrong-state{ background:var(--red-bad); cursor:pointer; box-shadow: 0 4px 0 #A83A29;}
  .feedback-banner{
    padding:14px 20px; font-weight:700; font-size:16px; display:flex; align-items:flex-start; gap:10px;
  }
  .feedback-banner.ok{ background:#E8F7EC; color:var(--green-ok); }
  .feedback-banner.bad{ background:#FCEAE6; color:var(--red-bad); }
  .feedback-sub{ font-size:13px; font-weight:500; color:var(--ink-soft); margin-top:2px; }

  /* ============ COMPLETE ============ */
  .complete-wrap{ flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:30px; gap:10px; position:relative; overflow:hidden;}
  .complete-emoji{ font-size:70px; margin-bottom:6px; animation:pop .5s ease;}
  .complete-title{ font-size:25px; font-weight:800; }
  .complete-sub{ font-size:14px; color:var(--ink-soft); font-weight:600;}
  .complete-stats{ display:flex; gap:14px; margin:18px 0; }
  .stat-card{ background:var(--card); border-radius:16px; padding:14px 18px; box-shadow:var(--shadow); min-width:92px; animation:pop .4s ease;}
  .stat-card .num{ font-size:23px; font-weight:800; color:var(--terracotta); }
  .stat-card .lbl{ font-size:11px; color:var(--ink-soft); font-weight:800; letter-spacing:.04em;}
  .confetti{ position:absolute; width:10px; height:10px; top:-12px; border-radius:2px; pointer-events:none; }
  @keyframes fall{ to{ transform: translateY(110vh) rotate(720deg); } }

  /* ============ NAV & LISTS ============ */
  .bottomnav{
    display:flex; border-top:1px solid var(--line); background:var(--card);
    padding: 8px 10px calc(env(safe-area-inset-bottom) + 8px);
  }
  .navbtn{ flex:1; display:flex; flex-direction:column; align-items:center; gap:2px; background:none; border:none; padding:6px; color:var(--ink-soft); font-size:11px; font-weight:800; cursor:pointer; }
  .navbtn.active{ color:var(--terracotta); }
  .navbtn .ic{ font-size:22px; }

  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding: calc(env(safe-area-inset-top) + 14px) 18px 10px;
  }
  .topbar .brand2{ font-weight:800; font-size:19px; color:var(--terracotta); }
  .wordbank-list{ padding:6px 18px 110px; overflow-y:auto; flex:1; }
  .word-row{ background:var(--card); border-radius:14px; padding:10px 12px 10px 16px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; gap:10px; box-shadow:var(--shadow); cursor:pointer; }
  .word-row:active{ background:#F5EFE3; }
  .word-row.notlearned{ opacity:.4; }
  .word-row .wa{ direction:rtl; font-size:20px; font-weight:700;}
  .word-row .wt{ font-size:12px; color:var(--teal-bright); font-style:italic; font-weight:700;}
  .word-row .we{ font-size:14px; font-weight:600; color:var(--ink-soft); text-align:right; flex:1; }
  .section-title{ font-size:19px; font-weight:800; padding:14px 18px 4px; }
  .bank-note{ font-size:12px; color:var(--ink-soft); padding: 0 18px 8px; }

  /* ============ PROFILE ============ */
  .profile-scroll{ flex:1; overflow-y:auto; padding: 6px 18px 110px; }
  .level-card{
    background:linear-gradient(135deg, var(--terracotta), #E06430); color:#fff;
    border-radius:20px; padding:20px; box-shadow:var(--shadow); margin-bottom:14px;
  }
  .level-card .lv-name{ font-size:21px; font-weight:800; }
  .level-card .lv-sub{ font-size:13px; opacity:.85; font-weight:600; margin-top:2px;}
  .lv-bar{ height:10px; background:rgba(255,255,255,.25); border-radius:6px; margin-top:12px; overflow:hidden;}
  .lv-bar div{ height:100%; background:#fff; border-radius:6px; }
  .pstats{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px;}
  .pstat{ background:var(--card); border-radius:16px; padding:14px; box-shadow:var(--shadow); text-align:center;}
  .pstat .v{ font-size:22px; font-weight:800; color:var(--teal); }
  .pstat .l{ font-size:11px; font-weight:800; color:var(--ink-soft); letter-spacing:.03em;}
  .unit-bars{ background:var(--card); border-radius:16px; padding:16px; box-shadow:var(--shadow);}
  .ubar-row{ margin-bottom:12px; }
  .ubar-row:last-child{ margin-bottom:0; }
  .ubar-label{ display:flex; justify-content:space-between; font-size:13px; font-weight:700; margin-bottom:5px;}
  .ubar-label span:last-child{ color:var(--ink-soft); font-weight:600;}
  .ubar{ height:9px; background:var(--line); border-radius:6px; overflow:hidden;}
  .ubar div{ height:100%; border-radius:6px; }
</style>
</head>
<body>
<div id="app">

  <!-- HOME -->
  <div class="screen active" id="screen-home">
    <div class="hero">
      <div class="hero-top">
        <div class="brand">🌿 Hkeeli<small>Lebanese Arabic, habibi-style</small></div>
      </div>
      <div class="hero-stats">
        <div class="hstat"><div class="v">🔥 <span id="streak-val">0</span></div><div class="l">STREAK</div></div>
        <div class="hstat"><div class="v">⭐ <span id="xp-val">0</span></div><div class="l">TOTAL XP</div></div>
        <div class="hstat"><div class="v">📖 <span id="words-val">0</span></div><div class="l">WORDS</div></div>
      </div>
      <div class="goal-ring-wrap">
        <svg width="46" height="46" viewBox="0 0 46 46">
          <circle cx="23" cy="23" r="19" fill="none" stroke="rgba(255,255,255,.25)" stroke-width="6"/>
          <circle id="goal-ring" cx="23" cy="23" r="19" fill="none" stroke="#F2BE4A" stroke-width="6"
                  stroke-linecap="round" stroke-dasharray="119.4" stroke-dashoffset="119.4"
                  transform="rotate(-90 23 23)"/>
          <text id="goal-pct" x="23" y="27" text-anchor="middle" font-size="11" font-weight="800" fill="#fff">0%</text>
        </svg>
        <div class="goal-text">Daily goal: <span id="goal-xp">0</span> / 30 XP<small id="goal-msg">Yalla — a little every day goes a long way!</small></div>
      </div>
    </div>
    <button class="practice-btn" id="practice-btn">💪 Practice my words</button>
    <div class="home-scroll" id="home-path"></div>
  </div>

  <!-- LESSON -->
  <div class="screen" id="screen-lesson">
    <div class="lesson-header">
      <button class="close-btn" onclick="exitLesson()">✕</button>
      <div class="progress-track"><div class="progress-fill" id="lesson-progress" style="width:0%"></div></div>
      <div class="hearts" id="lesson-hearts">❤️ 5</div>
    </div>
    <div class="quiz-body" id="quiz-body"></div>
    <div id="feedback-container"></div>
    <div class="footer-bar">
      <button class="btn-primary" id="check-btn" onclick="onCheckOrNext()">CHECK</button>
    </div>
  </div>

  <!-- COMPLETE -->
  <div class="screen" id="screen-complete">
    <div class="complete-wrap" id="complete-wrap">
      <div class="complete-emoji" id="complete-emoji">🎉</div>
      <div class="complete-title" id="complete-title">Lesson complete!</div>
      <div class="complete-sub" id="complete-sub"></div>
      <div class="complete-stats">
        <div class="stat-card"><div class="num" id="complete-xp">0</div><div class="lbl">XP EARNED</div></div>
        <div class="stat-card"><div class="num" id="complete-acc">0%</div><div class="lbl">ACCURACY</div></div>
      </div>
      <button class="btn-primary ready" style="max-width:280px" onclick="goHome()">CONTINUE</button>
    </div>
  </div>

  <!-- WORD BANK -->
  <div class="screen" id="screen-bank">
    <div class="topbar"><div class="brand2">📚 Word Bank</div></div>
    <div class="bank-note">Words light up as Eva learns them. Tap any word to hear it.</div>
    <div class="wordbank-list" id="wordbank-list"></div>
  </div>

  <!-- PROFILE -->
  <div class="screen" id="screen-profile">
    <div class="topbar"><div class="brand2">🌿 Eva's Journey</div></div>
    <div class="profile-scroll" id="profile-scroll"></div>
  </div>

  <!-- NAV -->
  <div class="bottomnav" id="bottomnav">
    <button class="navbtn active" onclick="showTab('home')" data-tab="home"><div class="ic">🏠</div>LEARN</button>
    <button class="navbtn" onclick="showTab('bank')" data-tab="bank"><div class="ic">📖</div>WORDS</button>
    <button class="navbtn" onclick="showTab('profile')" data-tab="profile"><div class="ic">🏆</div>PROFILE</button>
  </div>
</div>

<script>
/* =========================================================
   HKEELI v3 — Lebanese Arabic for Eva
   12 units, 114 words. Teach-first lessons, matching games,
   tap-to-hear answer options, sound effects, daily goals,
   levels, and real-recording audio support.
   ========================================================= */

const UNITS = [
  { id:'essentials', title:'First Words', sub:'The words you\'ll hear every single day', icon:'👋', color:'var(--teal-bright)',
    words:[
      {id:'marhaba', ar:'مرحبا', tr:'marhaba', en:'hello'},
      {id:'ahlein', ar:'أهلين', tr:'ahlein', en:'hi / welcome'},
      {id:'kifak', ar:'كيفك', tr:'kifak / kifik', en:'how are you'},
      {id:'mnih', ar:'منيح', tr:'mni7', en:'good / fine'},
      {id:'shukran', ar:'شكرا', tr:'shukran', en:'thank you'},
      {id:'yalla', ar:'يلا', tr:'yalla', en:"let's go / come on"},
      {id:'eh', ar:'إيه', tr:'eh', en:'yes (casual)'},
      {id:'la', ar:'لأ', tr:'la2', en:'no'},
    ]},
  { id:'sounds', title:'Lebanese Sounds', sub:'Train your ear: 7, 3, 2 and friends', icon:'🔤', color:'var(--terracotta)',
    words:[
      {id:'helou', ar:'حلو', tr:'7elou', en:'sweet / nice'},
      {id:'khobz', ar:'خبز', tr:'khobz', en:'bread'},
      {id:'ghali', ar:'غالي', tr:'ghali', en:'expensive'},
      {id:'albi', ar:'قلبي', tr:'2albi', en:'my heart'},
      {id:'ain', ar:'عين', tr:'3ein', en:'eye'},
      {id:'saha', ar:'صحة', tr:'sa7a', en:'health / bless you'},
      {id:'dow', ar:'ضو', tr:'dow', en:'light'},
      {id:'hon', ar:'هون', tr:'hon', en:'here'},
    ]},
  { id:'politeness', title:'Being Polite', sub:'Charm every teta in Lebanon', icon:'🤲', color:'var(--gold)',
    words:[
      {id:'sabah', ar:'صباح الخير', tr:'saba7 el kheir', en:'good morning'},
      {id:'masa', ar:'مسا الخير', tr:'masa2 el kheir', en:'good evening'},
      {id:'tosbah', ar:'تصبح على خير', tr:'tosba7 3ala kheir', en:'good night'},

const LESSON_SIZE = 4;
const DAILY_GOAL = 30;

/* ---------- Lesson plan ---------- */
function buildLessonPlan(){
  const plan = [];
  UNITS.forEach(unit=>{
    const chunks = [];
    for(let i=0; i<unit.words.length; i+=LESSON_SIZE){
      chunks.push(unit.words.slice(i, i+LESSON_SIZE));
    }
    chunks.forEach((chunk, li)=>{
      plan.push({
        key: unit.id + ':' + li,
        unit, lessonIdx: li, isReview:false,
        newWords: chunk,
        knownWords: unit.words.slice(0, Math.min(unit.words.length, (li+1)*LESSON_SIZE)),
        label: 'Lesson ' + (li+1),
      });
    });
    if(chunks.length > 1){
      plan.push({
        key: unit.id + ':review',
        unit, lessonIdx: chunks.length, isReview:true,
        newWords: [], knownWords: unit.words.slice(),
        label: 'Review',
      });
    }
  });
  return plan;
}
const LESSON_PLAN = buildLessonPlan();

/* ---------- Persistence ---------- */
const STORAGE_KEY = 'hkeeli_progress_v3';
function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw) return Object.assign({ xp:0, streak:0, lastPractice:null, lessonStars:{}, daily:{date:null, xp:0} }, JSON.parse(raw));
  }catch(e){}
  const st = { xp:0, streak:0, lastPractice:null, lessonStars:{}, daily:{date:null, xp:0} };
  // keep XP + streak from earlier versions (curriculum changed, path restarts)
  for(const oldKey of ['hkeeli_progress_v2','hkeeli_progress_v1']){
    try{
      const old = JSON.parse(localStorage.getItem(oldKey));
      if(old){ st.xp = old.xp||0; st.streak = old.streak||0; st.lastPractice = old.lastPractice||null; break; }
    }catch(e){}
  }
  return st;
}
function saveState(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
let state = loadState();

function todayStr(){ return new Date().toISOString().slice(0,10); }
function addXP(n){
  state.xp += n;
  if(state.daily.date !== todayStr()){ state.daily = {date: todayStr(), xp:0}; }
  state.daily.xp += n;
}
function bumpStreak(){
  const today = todayStr();
  if(state.lastPractice === today) return;
  const y = new Date(); y.setDate(y.getDate()-1);
  const yesterday = y.toISOString().slice(0,10);
  state.streak = (state.lastPractice === yesterday) ? state.streak + 1 : 1;
  state.lastPractice = today;
}

/* ---------- Sound effects ---------- */
let audioCtx = null;
function sfx(kind){
  try{
    if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    const now = audioCtx.currentTime;
    const notes = kind==='ok' ? [[660,0,.09],[880,.09,.14]]
               : kind==='bad' ? [[220,0,.18]]
               : [[523,0,.12],[659,.12,.12],[784,.24,.12],[1047,.36,.25]]; // win
    notes.forEach(([f, t, d])=>{
      const o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.type = kind==='bad' ? 'sawtooth' : 'sine';
      o.frequency.value = f;
      g.gain.setValueAtTime(0.001, now+t);
      g.gain.exponentialRampToValueAtTime(0.22, now+t+.02);
      g.gain.exponentialRampToValueAtTime(0.001, now+t+d);
      o.connect(g); g.connect(audioCtx.destination);
      o.start(now+t); o.stop(now+t+d+.05);
    });
  }catch(e){}
}

/* ---------- Word audio: recordings first, TTS fallback ---------- */
const audioAvailability = {};
function playWord(word, slow){
  if(audioAvailability[word.id] === false){ speakTTS(word.ar, slow); return; }
  let a = audioAvailability[word.id];
  if(!a){
    a = new Audio('audio/' + word.id + '.m4a');
    audioAvailability[word.id] = a;
  }
  a.playbackRate = slow ? 0.65 : 1;
  a.currentTime = 0;
  a.play().catch(()=>{
    audioAvailability[word.id] = false;
    speakTTS(word.ar, slow);
  });
}
function speakTTS(text, slow){
  try{
    if(!('speechSynthesis' in window)) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'ar-SA';
    u.rate = slow ? 0.5 : 0.85;
    const voices = window.speechSynthesis.getVoices();
    const arVoice = voices.find(v=>v.lang && v.lang.toLowerCase().startsWith('ar'));
    if(arVoice) u.voice = arVoice;
    window.speechSynthesis.speak(u);
  }catch(e){}
}

/* ---------- Exercise building ---------- */
function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){ const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}
function pickDistractors(word, pool, n){
  return shuffle(pool.filter(w=>w.id!==word.id)).slice(0,n);
}

function buildExercises(node){
  const ex = [];
  if(!node.isReview){
    const words = node.newWords;
    for(let i=0; i<words.length; i+=2){
      const pair = words.slice(i, i+2);
      pair.forEach(w=>ex.push({type:'teach', word:w}));
      pair.forEach(w=>{
        const taughtSoFar = words.slice(0, i+2);
        const pool = taughtSoFar.length>1 ? taughtSoFar : node.knownWords;
        ex.push({type:'mc_en', word:w, options: shuffle([w, ...pickDistractors(w, pool, 1)])});
        ex.push({type:'listen', word:w, options: shuffle([w, ...pickDistractors(w, pool, 1)])});
      });
    }
    shuffle(words).forEach((w, i)=>{
      const nOpts = Math.min(3, node.knownWords.length-1);
      if(i%2===0) ex.push({type:'mc_en', word:w, options: shuffle([w, ...pickDistractors(w, node.knownWords, nOpts)])});
      else ex.push({type:'mc_ar', word:w, options: shuffle([w, ...pickDistractors(w, node.knownWords, nOpts)])});
    });
    if(words.length >= 3) ex.push({type:'match', words: words.slice(0,5)});
    return ex;
  }
  const words = shuffle(node.knownWords);
  words.forEach((w, i)=>{
    const nOpts = Math.min(3, node.knownWords.length-1);
    ex.push({type: i%2===0 ? 'mc_en' : 'mc_ar', word:w, options: shuffle([w, ...pickDistractors(w, node.knownWords, nOpts)])});
    if(i%3===0) ex.push({type:'listen', word:w, options: shuffle([w, ...pickDistractors(w, node.knownWords, nOpts)])});
    if(i%2===0) ex.push({type:'type', word:w});
  });
  const shuffled = shuffle(ex);
  shuffled.push({type:'match', words: shuffle(words).slice(0,5)});
  return shuffled;
}

function buildPracticeSession(){
  const learned = learnedWordIds();
  const pool = ALL_WORDS.filter(w=>learned.has(w.id));
  const words = shuffle(pool).slice(0, 10);
  const ex = [];
  words.forEach((w,i)=>{
    const nOpts = Math.min(3, pool.length-1);
    const t = i%3;
    if(t===0) ex.push({type:'mc_en', word:w, options: shuffle([w, ...pickDistractors(w, pool, nOpts)])});
    else if(t===1) ex.push({type:'listen', word:w, options: shuffle([w, ...pickDistractors(w, pool, nOpts)])});
    else ex.push({type:'mc_ar', word:w, options: shuffle([w, ...pickDistractors(w, pool, nOpts)])});
  });
  if(words.length>=4) ex.push({type:'match', words: words.slice(0,5)});
  return shuffle(ex);
}

/* ---------- Session ---------- */
let session = null;

function startLesson(nodeKey){
  const node = LESSON_PLAN.find(n=>n.key===nodeKey);
  if(!node) return;
  beginSession(node, buildExercises(node));
}
function startPractice(){
  beginSession({key:'practice', label:'Practice', isReview:true, unit:null}, buildPracticeSession());
}
function beginSession(node, queue){
  session = {
    node, queue, pos:0,
    total: queue.length,
    quizTotal: queue.filter(q=>q.type!=='teach').length,
    correctCount:0, hearts:5, missed:[],
  };
  document.getElementById('bottomnav').style.display='none';
  showScreen('screen-lesson');
  renderExercise();
}
function exitLesson(){ if(confirm('End this lesson? Progress on it will be lost.')){ goHome(); } }

function updateHeaderBars(){
  const pct = Math.min(100, Math.round((session.pos/session.total)*100));
  document.getElementById('lesson-progress').style.width = pct+'%';
  document.getElementById('lesson-hearts').textContent = '❤️ '+session.hearts;
}

let selectedOptionEl = null;
let matchState = null;

function renderExercise(){
  if(session.pos >= session.queue.length){
    if(session.missed.length){
      session.queue = session.missed;
      session.missed = [];
      session.pos = 0;
      session.total = session.queue.length;
    } else {
      finishLesson();
      return;
    }
  }
  updateHeaderBars();
  const item = session.queue[session.pos];
  const body = document.getElementById('quiz-body');
  document.getElementById('feedback-container').innerHTML = '';
  const checkBtn = document.getElementById('check-btn');
  checkBtn.textContent = 'CHECK';
  checkBtn.className = 'btn-primary';
  checkBtn.disabled = true;
  selectedOptionEl = null;
  matchState = null;

  if(item.type === 'teach'){
    body.innerHTML = `
      <div class="prompt-label">New word</div>
      <div class="teach-card">
        <div class="teach-badge">✨ NEW WORD</div>
        <div class="teach-arabic">${item.word.ar}</div>
        <div class="teach-translit">${item.word.tr}</div>
        <div class="teach-english">${item.word.en}</div>
        <div class="listen-controls">
          <button class="speak-btn" id="teach-speak" aria-label="Play">🔊</button>
          <button class="speak-btn slow" id="teach-slow" aria-label="Play slowly">🐢</button>
        </div>
        <div class="teach-tip">Tap 🔊 to hear it (🐢 for slow), then try saying it out loud!</div>
      </div>
    `;
    document.getElementById('teach-speak').onclick = ()=>playWord(item.word);
    document.getElementById('teach-slow').onclick = ()=>playWord(item.word, true);
    playWord(item.word);
    checkBtn.textContent = 'GOT IT';
    checkBtn.className = 'btn-primary ready';
    checkBtn.disabled = false;

  } else if(item.type === 'mc_en'){
    body.innerHTML = `
      <div class="prompt-label">Select the correct meaning</div>
      <div class="prompt-main">
        <div class="prompt-row">
          <div class="arabic-big">${item.word.ar}</div>
          <button class="mini-speak" id="prompt-speak" aria-label="Play">🔊</button>
        </div>
        <div class="translit">${item.word.tr}</div>
      </div>
      <div class="options" id="opts"></div>
    `;
    document.getElementById('prompt-speak').onclick = ()=>playWord(item.word);
    const opts = document.getElementById('opts');
    item.options.forEach(o=>{
      const el = document.createElement('div');
      el.className='option';
      el.textContent = o.en;
      el.onclick = ()=>selectOption(el, o===item.word);
      opts.appendChild(el);
    });

  } else if(item.type === 'mc_ar'){
    body.innerHTML = `
      <div class="prompt-label">Select the correct word — tap 🔊 to hear each one</div>
      <div class="prompt-main"><div class="english-big">${item.word.en}</div></div>
      <div class="options" id="opts"></div>
    `;
    const opts = document.getElementById('opts');
    item.options.forEach(o=>{
      const el = document.createElement('div');
      el.className='option';
      el.innerHTML = `<span class="opt-text"><span style="direction:rtl;font-size:20px;">${o.ar}</span><span class="opt-sub">${o.tr}</span></span>`;
      const playBtn = document.createElement('button');
      playBtn.className='mini-speak';
      playBtn.setAttribute('aria-label','Play');
      playBtn.textContent='🔊';
      playBtn.onclick = (e)=>{ e.stopPropagation(); playWord(o); };
      el.appendChild(playBtn);
      el.onclick = ()=>selectOption(el, o===item.word);
      opts.appendChild(el);
    });

  } else if(item.type === 'listen'){
    body.innerHTML = `
      <div class="prompt-label">What do you hear? Tap each option to compare the sounds</div>
      <div class="prompt-main" style="align-items:center; width:100%;">
        <div class="listen-controls">
          <button class="speak-btn" id="speak-btn" aria-label="Play">🔊</button>
          <button class="speak-btn slow" id="speak-slow" aria-label="Play slowly">🐢</button>
        </div>
      </div>
      <div class="options" id="opts"></div>
    `;
    document.getElementById('speak-btn').onclick = ()=>playWord(item.word);
    document.getElementById('speak-slow').onclick = ()=>playWord(item.word, true);
    playWord(item.word);
    const opts = document.getElementById('opts');
    item.options.forEach(o=>{
      const el = document.createElement('div');
      el.className='option';
      el.innerHTML = `<span class="opt-text"><span class="opt-tr">${o.tr}</span><span class="opt-sub" style="direction:ltr; font-style:normal;">${o.ar}</span></span><button class="mini-speak" aria-label="Play">🔊</button>`;
      // tapping ANYWHERE on the option plays its sound AND selects it,
      // so Eva can compare all the sounds before checking
      el.onclick = ()=>{ playWord(o); selectOption(el, o===item.word); };
      el.querySelector('.mini-speak').onclick = (e)=>{ e.stopPropagation(); playWord(o); };
      opts.appendChild(el);
    });

  } else if(item.type === 'match'){
    matchState = { remaining: item.words.length, picked: null };
    const left = shuffle(item.words);   // Arabic side
    const right = shuffle(item.words);  // English side
    body.innerHTML = `
      <div class="prompt-label">Match the pairs — tap a word, then its meaning</div>
      <div class="match-grid" id="match-grid"></div>
    `;
    const grid = document.getElementById('match-grid');
    const cards = [];
    for(let i=0;i<item.words.length;i++){
      const wA = left[i];
      const cA = document.createElement('div');
      cA.className='match-card';
      cA.innerHTML = `<div class="m-ar">${wA.ar}</div><div class="m-tr">${wA.tr}</div>`;
      cA.dataset.wid = wA.id; cA.dataset.side = 'ar';
      cA.onclick = ()=>{ playWord(wA); matchTap(cA); };
      cards.push(cA);
      const wB = right[i];
      const cB = document.createElement('div');
      cB.className='match-card';
      cB.textContent = wB.en;
      cB.dataset.wid = wB.id; cB.dataset.side = 'en';
      cB.onclick = ()=>matchTap(cB);
      cards.push(cB);
    }
    // interleave columns: Arabic left, English right
    for(let i=0;i<item.words.length;i++){
      grid.appendChild(cards[i*2]);
      grid.appendChild(cards[i*2+1]);
    }

  } else if(item.type === 'type'){
    body.innerHTML = `
      <div class="prompt-label">Type this word in Latin letters (transliteration)</div>
      <div class="prompt-main">
        <div class="prompt-row">
          <div class="arabic-big">${item.word.ar}</div>
          <button class="mini-speak" id="prompt-speak" aria-label="Play">🔊</button>
        </div>
        <div class="translit">meaning: ${item.word.en}</div>
      </div>
      <input class="type-input" id="type-in" placeholder="type here..." autocapitalize="off" autocorrect="off" spellcheck="false">
      <div class="hint">Spelling of sounds like 3, 7, 2 is flexible — just get close!</div>
    `;
    document.getElementById('prompt-speak').onclick = ()=>playWord(item.word);
    const input = document.getElementById('type-in');
    input.addEventListener('input', ()=>{ checkBtn.disabled = input.value.trim().length===0; });
    input.focus();
  }
}

function matchTap(card){
  if(card.classList.contains('matched')) return;
  if(!matchState.picked){
    document.querySelectorAll('.match-card').forEach(c=>c.classList.remove('picked'));
    card.classList.add('picked');
    matchState.picked = card;
    return;
  }
  const prev = matchState.picked;
  if(prev === card){ card.classList.remove('picked'); matchState.picked = null; return; }
  if(prev.dataset.side === card.dataset.side){
    prev.classList.remove('picked');
    card.classList.add('picked');
    matchState.picked = card;
    return;
  }
  if(prev.dataset.wid === card.dataset.wid){
    prev.classList.remove('picked');
    prev.classList.add('matched');
    card.classList.add('matched');
    sfx('ok');
    matchState.picked = null;
    matchState.remaining--;
    if(matchState.remaining === 0){
      session.correctCount++;
      const btn = document.getElementById('check-btn');
      btn.textContent = 'CONTINUE';
      btn.className = 'btn-primary ready';
      btn.disabled = false;
      const fc = document.getElementById('feedback-container');
      fc.innerHTML = `<div class="feedback-banner ok"><div>✅</div><div>All matched — 3anjad excellent!</div></div>`;
    }
  } else {
    sfx('bad');
    prev.classList.remove('picked');
    prev.classList.add('wrongflash');
    card.classList.add('wrongflash');
    setTimeout(()=>{ prev.classList.remove('wrongflash'); card.classList.remove('wrongflash'); }, 450);
    matchState.picked = null;
  }
}

function selectOption(el, isCorrect){
  if(document.getElementById('check-btn').textContent === 'CONTINUE') return;
  document.querySelectorAll('.option').forEach(o=>o.classList.remove('selected'));
  el.classList.add('selected');
  selectedOptionEl = el;
  el.dataset.correct = isCorrect ? '1':'0';
  document.getElementById('check-btn').disabled = false;
}

function normalize(str){
  return str.toLowerCase().replace(/[\/\-\s.']+/g,'').trim();
}
/* "soft" form: forgive the chat-alphabet numbers (7→h, 3→a, 2 dropped, 5→kh)
   so typing "bhebbak" for "b7ebbak" or "manoushe" for "man2oushe" still counts */
function soften(str){
  return str.replace(/7/g,'h').replace(/3/g,'a').replace(/2/g,'').replace(/5/g,'kh');
}
/* edit distance, capped — lets one small typo slide on longer words */
function editDist(a, b, max){
  if(Math.abs(a.length-b.length) > max) return max+1;
  let prev = Array.from({length: b.length+1}, (_,i)=>i);
  for(let i=1;i<=a.length;i++){
    const cur = [i];
    let rowMin = i;
    for(let j=1;j<=b.length;j++){
      cur[j] = Math.min(prev[j]+1, cur[j-1]+1, prev[j-1] + (a[i-1]===b[j-1]?0:1));
      rowMin = Math.min(rowMin, cur[j]);
    }
    if(rowMin > max) return max+1;
    prev = cur;
  }
  return prev[b.length];
}
function fuzzyMatch(input, answer){
  const a = normalize(input), aS = soften(a);
  const options = answer.split('/').map(s=>normalize(s));
  return options.some(o=>{
    const oS = soften(o);
    if(a===o || aS===oS) return true;
    if(a.length>2 && (o.includes(a)||a.includes(o))) return true;
    if(aS.length>2 && (oS.includes(aS)||aS.includes(oS))) return true;
    const tol = oS.length >= 10 ? 2 : oS.length >= 5 ? 1 : 0;
    if(tol && editDist(aS, oS, tol) <= tol) return true;
    return false;
  });
}

function onCheckOrNext(){
  const btn = document.getElementById('check-btn');
  const item = session.queue[session.pos];
  if(item && (item.type === 'teach' || item.type === 'match') && btn.textContent !== 'CHECK'){
    session.pos += 1;
    renderExercise();
    return;
  }
  if(btn.textContent === 'CHECK'){
    evaluateCurrent();
  } else {
    session.pos += 1;
    renderExercise();
  }
}

function evaluateCurrent(){
  const item = session.queue[session.pos];
  let correct = false;
  if(item.type === 'type'){
    const val = document.getElementById('type-in').value;
    correct = fuzzyMatch(val, item.word.tr);
  } else if(selectedOptionEl){
    correct = selectedOptionEl.dataset.correct === '1';
    document.querySelectorAll('.option').forEach(o=>{
      if(o===selectedOptionEl) o.classList.add(correct?'correct':'wrong');
    });
  }
  sfx(correct ? 'ok' : 'bad');
  showFeedback(correct, item);
  if(correct){ session.correctCount++; }
  else {
    session.hearts = Math.max(0, session.hearts-1);
    session.missed.push({type:'teach', word:item.word});
    session.missed.push(item);
  }
}

function showFeedback(correct, item){
  const fc = document.getElementById('feedback-container');
  const correctAnswerText = item.type==='type' ? item.word.tr
    : item.type==='listen' ? `${item.word.tr} (${item.word.en})`
    : item.type==='mc_ar' ? `${item.word.ar} (${item.word.tr})`
    : item.word.en;
  fc.innerHTML = `
    <div class="feedback-banner ${correct?'ok':'bad'}">
      <div>${correct?'✅':'❌'}</div>
      <div>
        <div>${correct? randomPraise() : 'Correct answer: '+correctAnswerText}</div>
        ${!correct?`<div class="feedback-sub">${item.word.ar} — ${item.word.tr} — ${item.word.en} (we'll see this one again!)</div>`:''}
      </div>
    </div>
  `;
  const btn = document.getElementById('check-btn');
  btn.textContent = 'CONTINUE';
  btn.className = 'btn-primary ' + (correct?'ready':'wrong-state');
  btn.disabled = false;
  document.querySelectorAll('.option').forEach(o=>o.style.pointerEvents='none');
}
function randomPraise(){
  const p = ['Nice! 👏','3anjad good!','Mumtaz! ⭐','Killa 7elou!','Perfect!','Bravo, Eva!','Ktir mni7! 🙌'];
  return p[Math.floor(Math.random()*p.length)];
}

function finishLesson(){
  const earned = session.correctCount * 10;
  addXP(earned);
  bumpStreak();
  if(session.node.key !== 'practice'){
    const prevStars = state.lessonStars[session.node.key] || 0;
    state.lessonStars[session.node.key] = Math.max(prevStars, session.hearts>=4?3:session.hearts>=2?2:1);
  }
  saveState();
  sfx('win');

  document.getElementById('complete-emoji').textContent = session.hearts>=4 ? '🎉' : session.hearts>=2 ? '💪' : '🌱';
  document.getElementById('complete-xp').textContent = earned;
  document.getElementById('complete-acc').textContent = computeAccuracy()+'%';
  document.getElementById('complete-title').textContent =
    session.node.key==='practice' ? 'Practice complete!' :
    session.hearts>=4 ? 'Mumtaz — perfect lesson!' : 'Lesson complete!';
  document.getElementById('complete-sub').textContent =
    (state.daily.xp >= DAILY_GOAL) ? 'Daily goal reached — see you tomorrow! 🔥' : `${Math.max(0, DAILY_GOAL - state.daily.xp)} XP to today's goal`;
  showScreen('screen-complete');
  throwConfetti();
}
function computeAccuracy(){
  const denom = session.quizTotal || 1;
  const pct = Math.round((session.correctCount / denom) * 100);
  return Math.max(0, Math.min(100, pct));
}
function throwConfetti(){
  const wrap = document.getElementById('complete-wrap');
  wrap.querySelectorAll('.confetti').forEach(c=>c.remove());
  const colors = ['#E0A526','#C1440E','#1E7F86','#2FA95C','#8E4A6B','#3A6EA5'];
  for(let i=0;i<44;i++){
    const c = document.createElement('div');
    c.className='confetti';
    c.style.left = Math.random()*100+'%';
    c.style.background = colors[i%colors.length];
    c.style.width = (6+Math.random()*7)+'px';
    c.style.height = (6+Math.random()*7)+'px';
    c.style.borderRadius = Math.random()>0.5 ? '50%' : '2px';
    c.style.animation = `fall ${1.8+Math.random()*1.8}s ${Math.random()*0.8}s ease-in forwards`;
    wrap.appendChild(c);
  }
}

/* ---------- Init ---------- */
renderHome();

if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
