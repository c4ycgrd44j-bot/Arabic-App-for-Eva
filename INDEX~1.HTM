<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Hkeeli - Lebanese Arabic</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Hkeeli">
<meta name="theme-color" content="#C1440E">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<style>
  :root{
    --cream:#FBF6EE;
    --card:#FFFFFF;
    --ink:#2B2420;
    --ink-soft:#6b6259;
    --terracotta:#C1440E;
    --terracotta-dark:#a3390b;
    --teal:#1F6F6B;
    --teal-dark:#175653;
    --gold:#D9A441;
    --green-ok:#3AA65B;
    --red-bad:#E0533D;
    --line:#EDE3D4;
    --shadow: 0 4px 14px rgba(43,36,32,0.08);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html,body{
    margin:0; padding:0; height:100%;
    background:var(--cream);
    color:var(--ink);
    font-family:-apple-system, BlinkMacSystemFont, "SF Pro Text", Segoe UI, Roboto, sans-serif;
    overscroll-behavior:none;
  }
  #app{
    max-width:480px; margin:0 auto; min-height:100vh;
    display:flex; flex-direction:column;
    padding-bottom: env(safe-area-inset-bottom);
  }
  .screen{ display:none; flex-direction:column; flex:1; animation: fadein .25s ease; }
  .screen.active{ display:flex; }
  @keyframes fadein{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:none;} }

  /* ---- Top bar (home) ---- */
  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding: calc(env(safe-area-inset-top) + 14px) 18px 10px;
  }
  .brand{ display:flex; align-items:center; gap:8px; font-weight:800; font-size:19px; color:var(--terracotta); }
  .brand .leaf{ font-size:20px; }
  .stat-pill{
    display:flex; align-items:center; gap:5px;
    background:var(--card); border-radius:20px; padding:6px 12px;
    font-weight:700; font-size:14px; box-shadow:var(--shadow);
  }
  .stats-row{ display:flex; gap:8px; padding: 0 18px 8px; }

  /* ---- Home path ---- */
  .home-scroll{ flex:1; overflow-y:auto; padding: 6px 18px 100px; }
  .unit-block{ margin-bottom: 28px; }
  .unit-header{
    background: var(--teal); color:#fff; border-radius:16px;
    padding:14px 16px; margin-bottom:18px; box-shadow:var(--shadow);
  }
  .unit-header h2{ margin:0 0 2px; font-size:17px; }
  .unit-header p{ margin:0; font-size:13px; opacity:.85; }
  .path{ display:flex; flex-direction:column; align-items:center; gap:22px; }
  .path-node{ display:flex; flex-direction:column; align-items:center; gap:6px; }
  .node{
    width:64px; height:64px; border-radius:50%;
    background: var(--gold);
    display:flex; align-items:center; justify-content:center;
    font-size:24px; color:#fff; box-shadow: 0 4px 0 rgba(0,0,0,0.15), var(--shadow);
    border:none; position:relative; cursor:pointer;
  }
  .node.locked{ background:#D8CFC0; box-shadow:0 4px 0 rgba(0,0,0,0.08); }
  .node.done{ background: var(--green-ok); }
  .node.review{ background: var(--terracotta); }
  .node .stars{ position:absolute; bottom:-10px; font-size:10px; background:#fff; border-radius:10px; padding:2px 7px; color:var(--ink); box-shadow:var(--shadow); font-weight:700; }
  .node-label{ font-size:12px; font-weight:700; color:var(--ink-soft); text-align:center; max-width:160px; }

  /* ---- Lesson screen ---- */
  .lesson-header{
    display:flex; align-items:center; gap:12px;
    padding: calc(env(safe-area-inset-top) + 14px) 16px 14px;
  }
  .close-btn{ background:none; border:none; font-size:22px; color:var(--ink-soft); cursor:pointer; padding:4px 8px; }
  .progress-track{ flex:1; height:14px; background:var(--line); border-radius:8px; overflow:hidden; }
  .progress-fill{ height:100%; background:var(--green-ok); border-radius:8px; transition:width .3s ease; }
  .hearts{ display:flex; align-items:center; gap:3px; font-weight:800; color:var(--red-bad); font-size:15px; white-space:nowrap; }

  .quiz-body{ flex:1; padding:8px 20px 20px; display:flex; flex-direction:column; }
  .prompt-label{ font-size:14px; font-weight:700; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.03em; margin-bottom:14px;}
  .prompt-main{ display:flex; flex-direction:column; align-items:flex-start; gap:6px; margin-bottom:22px;}
  .prompt-row{ display:flex; align-items:center; gap:12px; }
  .arabic-big{ font-size:40px; font-weight:700; direction:rtl; }
  .translit{ font-size:16px; color:var(--ink-soft); font-style:italic; }
  .english-big{ font-size:26px; font-weight:700; }
  .speak-btn{
    display:flex; align-items:center; justify-content:center;
    width:56px; height:56px; border-radius:50%; background:var(--teal); color:#fff;
    border:none; font-size:24px; box-shadow:var(--shadow); cursor:pointer; margin-bottom:10px;
  }
  .speak-btn:active{ transform:scale(0.94); }
  .mini-speak{
    display:inline-flex; align-items:center; justify-content:center;
    width:34px; height:34px; border-radius:50%; background:var(--teal); color:#fff;
    border:none; font-size:15px; flex-shrink:0; cursor:pointer;
  }
  .mini-speak:active{ transform:scale(0.9); }

  /* ---- Teach card ---- */
  .teach-card{
    background:var(--card); border-radius:20px; padding:28px 22px;
    box-shadow:var(--shadow); display:flex; flex-direction:column; align-items:center; gap:10px;
    text-align:center; margin-top:10px;
  }
  .teach-badge{
    background:var(--gold); color:#fff; font-size:12px; font-weight:800;
    letter-spacing:.06em; padding:4px 12px; border-radius:12px;
  }
  .teach-arabic{ font-size:52px; font-weight:700; direction:rtl; margin-top:6px; }
  .teach-translit{ font-size:20px; color:var(--teal); font-weight:700; font-style:italic; }
  .teach-english{ font-size:18px; color:var(--ink-soft); font-weight:600; }
  .teach-tip{ font-size:13px; color:var(--ink-soft); margin-top:8px; }

  .options{ display:flex; flex-direction:column; gap:12px; }
  .option{
    background:var(--card); border:2px solid var(--line); border-radius:14px;
    padding:14px 16px; font-size:17px; font-weight:600; text-align:left;
    cursor:pointer; display:flex; flex-direction:row; align-items:center; justify-content:space-between; gap:10px;
  }
  .option .opt-text{ display:flex; flex-direction:column; gap:2px; }
  .option .opt-sub{ font-size:13px; font-weight:400; color:var(--ink-soft); font-style:italic; direction:rtl; text-align:left;}
  .option.selected{ border-color:var(--teal); background:#EAF5F3; }
  .option.correct{ border-color:var(--green-ok); background:#E8F7EC; }
  .option.wrong{ border-color:var(--red-bad); background:#FCEAE6; }

  .type-input{
    width:100%; font-size:20px; padding:14px 16px; border-radius:14px;
    border:2px solid var(--line); font-family:inherit; margin-bottom:10px;
  }
  .type-input:focus{ outline:none; border-color:var(--teal); }
  .hint{ font-size:13px; color:var(--ink-soft); margin-bottom:14px; }

  .footer-bar{
    padding:16px 20px calc(env(safe-area-inset-bottom) + 16px);
    background:var(--cream);
  }
  .btn-primary{
    width:100%; padding:16px; border:none; border-radius:14px;
    background: #D8CFC0; color:#fff; font-size:17px; font-weight:800;
    cursor:not-allowed;
  }
  .btn-primary.ready{ background:var(--green-ok); cursor:pointer; }
  .btn-primary.wrong-state{ background:var(--red-bad); cursor:pointer; }
  .feedback-banner{
    padding:14px 20px; font-weight:700; font-size:16px; display:flex; align-items:center; gap:10px;
  }
  .feedback-banner.ok{ background:#E8F7EC; color:var(--green-ok); }
  .feedback-banner.bad{ background:#FCEAE6; color:var(--red-bad); }
  .feedback-sub{ font-size:13px; font-weight:500; color:var(--ink-soft); margin-top:2px; }

  /* ---- Complete screen ---- */
  .complete-wrap{ flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:30px; gap:10px;}
  .complete-emoji{ font-size:64px; margin-bottom:6px;}
  .complete-title{ font-size:24px; font-weight:800; }
  .complete-stats{ display:flex; gap:16px; margin:18px 0; }
  .stat-card{ background:var(--card); border-radius:14px; padding:14px 18px; box-shadow:var(--shadow); min-width:90px;}
  .stat-card .num{ font-size:22px; font-weight:800; color:var(--terracotta); }
  .stat-card .lbl{ font-size:12px; color:var(--ink-soft); font-weight:700; }

  /* Bottom nav */
  .bottomnav{
    display:flex; border-top:1px solid var(--line); background:var(--card);
    padding: 8px 10px calc(env(safe-area-inset-bottom) + 8px);
  }
  .navbtn{ flex:1; display:flex; flex-direction:column; align-items:center; gap:2px; background:none; border:none; padding:6px; color:var(--ink-soft); font-size:11px; font-weight:700; cursor:pointer; }
  .navbtn.active{ color:var(--terracotta); }
  .navbtn .ic{ font-size:22px; }

  .wordbank-list{ padding:6px 18px 100px; overflow-y:auto; flex:1; }
  .word-row{ background:var(--card); border-radius:14px; padding:10px 12px 10px 16px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; gap:10px; box-shadow:var(--shadow); cursor:pointer; }
  .word-row:active{ background:#F5EFE3; }
  .word-row.notlearned{ opacity:.45; }
  .word-row .wa{ direction:rtl; font-size:20px; font-weight:700;}
  .word-row .wt{ font-size:12px; color:var(--ink-soft); font-style:italic;}
  .word-row .we{ font-size:14px; font-weight:600; color:var(--ink-soft); text-align:right; flex:1; }
  .section-title{ font-size:20px; font-weight:800; padding:14px 18px 4px; }
  .bank-note{ font-size:12px; color:var(--ink-soft); padding: 0 18px 8px; }
</style>
</head>
<body>
<div id="app">

  <!-- HOME SCREEN -->
  <div class="screen active" id="screen-home">
    <div class="topbar">
      <div class="brand"><span class="leaf">🌿</span> Hkeeli</div>
    </div>
    <div class="stats-row">
      <div class="stat-pill">🔥 <span id="streak-val">0</span></div>
      <div class="stat-pill">⭐ <span id="xp-val">0</span> XP</div>
    </div>
    <div class="home-scroll" id="home-path"></div>
  </div>

  <!-- LESSON SCREEN -->
  <div class="screen" id="screen-lesson">
    <div class="lesson-header">
      <button class="close-btn" onclick="exitLesson()">✕</button>
      <div class="progress-track"><div class="progress-fill" id="lesson-progress" style="width:0%"></div></div>
      <div class="hearts" id="lesson-hearts">❤️ 5</div>
    </div>
    <div class="quiz-body" id="quiz-body"></div>
    <div id="feedback-container"></div>
    <div class="footer-bar">
      <button class="btn-primary" id="check-btn" onclick="onCheckOrNext()">CHECK</button>
    </div>
  </div>

  <!-- COMPLETE SCREEN -->
  <div class="screen" id="screen-complete">
    <div class="complete-wrap">
      <div class="complete-emoji">🎉</div>
      <div class="complete-title" id="complete-title">Lesson complete!</div>
      <div class="complete-stats">
        <div class="stat-card"><div class="num" id="complete-xp">0</div><div class="lbl">XP EARNED</div></div>
        <div class="stat-card"><div class="num" id="complete-acc">0%</div><div class="lbl">ACCURACY</div></div>
      </div>
      <button class="btn-primary ready" style="max-width:280px" onclick="goHome()">CONTINUE</button>
    </div>
  </div>

  <!-- WORDBANK SCREEN -->
  <div class="screen" id="screen-bank">
    <div class="topbar"><div class="brand"><span class="leaf">📚</span> Word Bank</div></div>
    <div class="bank-note">Words appear in full color once Eva has learned them. Tap any word to hear it.</div>
    <div class="wordbank-list" id="wordbank-list"></div>
  </div>

  <!-- BOTTOM NAV -->
  <div class="bottomnav" id="bottomnav">
    <button class="navbtn active" onclick="showTab('home')" data-tab="home"><div class="ic">🏠</div>LEARN</button>
    <button class="navbtn" onclick="showTab('bank')" data-tab="bank"><div class="ic">📖</div>WORDS</button>
  </div>
</div>

<script>
/* =========================================================
   HKEELI — Lebanese Arabic learning app for Eva
   v2: true-beginner progression.
   - Units are split into small lessons (~4 new words each).
   - Lessons TEACH each new word with a card before quizzing.
   - Early questions are easy (2 choices), harder ones come later.
   - Typing only appears in the Review lesson of each unit.
   - Every lesson node unlocks sequentially, Duolingo-style.
   Audio: plays audio/<word id>.m4a if the file exists in the
   repo (real Lebanese recordings!), otherwise falls back to
   the phone's Arabic text-to-speech.
   ========================================================= */

const UNITS = [
  {
    id:'sounds', title:'Letters & Sounds', sub:'Get your ear tuned to Lebanese sounds', icon:'🔤',
    words:[
      {id:'marhaba', ar:'مرحبا', tr:'marhaba', en:'hello'},
      {id:'helou', ar:'حلو', tr:"7elou", en:'sweet / nice'},
      {id:'khobz', ar:'خبز', tr:'khobz', en:'bread'},
      {id:'ghali', ar:'غالي', tr:'ghali', en:'expensive'},
      {id:'albi', ar:'قلبي', tr:"2albi", en:'my heart'},
      {id:'hon', ar:'هون', tr:'hon', en:'here'},
      {id:'dow', ar:'ضو', tr:'dow', en:'light'},
      {id:'saha', ar:'صحة', tr:'sa7a', en:'health / bless you'},
    ]
  },
  {
    id:'greetings', title:'Greetings', sub:'Say hi like a local', icon:'👋',
    words:[
      {id:'ahlein', ar:'أهلين', tr:'ahlein', en:'hi / welcome'},
      {id:'kifak', ar:'كيفك', tr:'kifak / kifik', en:'how are you'},
      {id:'mnih', ar:'منيح', tr:'mni7', en:'good / fine'},
      {id:'yalla', ar:'يلا', tr:'yalla', en:"let's go / come on"},
      {id:'sabah', ar:'صباح الخير', tr:'saba7 el kheir', en:'good morning'},
      {id:'masa', ar:'مسا الخير', tr:'masa2 el kheir', en:'good evening'},
      {id:'maasalame', ar:'مع السلامة', tr:'ma3 el salame', en:'goodbye'},
      {id:'tosbah', ar:'تصبح على خير', tr:'tosba7 3ala kheir', en:'good night'},
    ]
  },
  {
    id:'numbers', title:'Numbers 1–10', sub:'Count it out', icon:'🔢',
    words:[
      {id:'wahad', ar:'واحد', tr:'wa7ad', en:'one'},
      {id:'tnein', ar:'تنين', tr:'tnein', en:'two'},
      {id:'tlete', ar:'تلاتة', tr:'tlete', en:'three'},
      {id:'arbaa', ar:'أربعة', tr:"arb3a", en:'four'},
      {id:'khamse', ar:'خمسة', tr:'khamse', en:'five'},
      {id:'sitte', ar:'ستة', tr:'sitte', en:'six'},
      {id:'sabaa', ar:'سبعة', tr:"sab3a", en:'seven'},
      {id:'tmene', ar:'تمانية', tr:'tmene', en:'eight'},
      {id:'tisaa', ar:'تسعة', tr:"tis3a", en:'nine'},
      {id:'ashra', ar:'عشرة', tr:"3ashra", en:'ten'},
    ]
  },
  {
    id:'phrases', title:'Basic Phrases', sub:'Everyday essentials', icon:'💬',
    words:[
      {id:'shukran', ar:'شكرا', tr:'shukran', en:'thank you'},
      {id:'afwan', ar:'عفوا', tr:'3afwan', en:"you're welcome"},
      {id:'lawsamaht', ar:'لو سمحت', tr:'law sama7t', en:'please'},
      {id:'asef', ar:'آسف', tr:'asef / asfe', en:'sorry'},
      {id:'naam', ar:'نعم', tr:'na3am', en:'yes'},
      {id:'la', ar:'لأ', tr:"la2", en:'no'},
      {id:'shuismak', ar:'شو إسمك', tr:'shu ismak / ismik', en:"what's your name"},
      {id:'mabaarif', ar:'ما بعرف', tr:'ma ba3rif', en:"I don't know"},
    ]
  },
  {
    id:'family', title:'Family', sub:'Talk about the people you love', icon:'👨‍👩‍👧',
    words:[
      {id:'mama', ar:'ماما', tr:'mama', en:'mom'},
      {id:'baba', ar:'بابا', tr:'baba', en:'dad'},
      {id:'akh', ar:'أخ', tr:'akh', en:'brother'},
      {id:'ekht', ar:'أخت', tr:'ekht', en:'sister'},
      {id:'teta', ar:'تيتا', tr:'teta', en:'grandma'},
      {id:'jiddo', ar:'جدو', tr:'jiddo', en:'grandpa'},
      {id:'zawje', ar:'زوجة', tr:'zawje', en:'wife'},
      {id:'zawj', ar:'زوج', tr:'zawj', en:'husband'},
      {id:'bint', ar:'بنت', tr:'bint', en:'daughter / girl'},
      {id:'ibn', ar:'إبن', tr:'ibn', en:'son'},
    ]
  },
];

const LESSON_SIZE = 4; // new words introduced per lesson

/* ---------- Lesson plan: units → sequence of small lesson nodes ---------- */
function buildLessonPlan(){
  const plan = [];
  UNITS.forEach(unit=>{
    const chunks = [];
    for(let i=0; i<unit.words.length; i+=LESSON_SIZE){
      chunks.push(unit.words.slice(i, i+LESSON_SIZE));
    }
    chunks.forEach((chunk, li)=>{
      plan.push({
        key: unit.id + ':' + li,
        unit,
        lessonIdx: li,
        isReview: false,
        newWords: chunk,
        // words available as answer choices: everything taught up to and incl. this lesson
        knownWords: unit.words.slice(0, (li+1)*LESSON_SIZE),
        label: 'Lesson ' + (li+1),
      });
    });
    if(chunks.length > 1){
      plan.push({
        key: unit.id + ':review',
        unit,
        lessonIdx: chunks.length,
        isReview: true,
        newWords: [],
        knownWords: unit.words.slice(),
        label: 'Review',
      });
    }
  });
  return plan;
}
const LESSON_PLAN = buildLessonPlan();

/* ---------- Persistence ---------- */
const STORAGE_KEY = 'hkeeli_progress_v2';
function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){}
  // migrate old v1 progress: if they had stars on a unit, credit its lessons
  let migrated = { xp:0, streak:0, lastPractice:null, lessonStars:{} };
  try{
    const old = JSON.parse(localStorage.getItem('hkeeli_progress_v1'));
    if(old){
      migrated.xp = old.xp || 0;
      migrated.streak = old.streak || 0;
      migrated.lastPractice = old.lastPractice || null;
      if(old.unitStars){
        LESSON_PLAN.forEach(node=>{
          if(old.unitStars[node.unit.id] >= 1){ migrated.lessonStars[node.key] = old.unitStars[node.unit.id]; }
        });
      }
    }
  }catch(e){}
  return migrated;
}
function saveState(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
let state = loadState();

function todayStr(){ return new Date().toISOString().slice(0,10); }
function bumpStreak(){
  const today = todayStr();
  if(state.lastPractice === today) return;
  const y = new Date(); y.setDate(y.getDate()-1);
  const yesterday = y.toISOString().slice(0,10);
  if(state.lastPractice === yesterday){ state.streak += 1; }
  else { state.streak = 1; }
  state.lastPractice = today;
  saveState();
}

/* ---------- Which words has Eva learned? ---------- */
function isNodeDone(key){ return (state.lessonStars[key] || 0) >= 1; }
function learnedWordIds(){
  const ids = new Set();
  LESSON_PLAN.forEach(node=>{
    if(!node.isReview && isNodeDone(node.key)){
      node.newWords.forEach(w=>ids.add(w.id));
    }
  });
  return ids;
}

/* ---------- Navigation ---------- */
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function showTab(tab){
  document.querySelectorAll('.navbtn').forEach(b=>b.classList.toggle('active', b.dataset.tab===tab));
  if(tab==='home'){ showScreen('screen-home'); renderHome(); }
  else { showScreen('screen-bank'); renderWordBank(); }
}
function goHome(){ document.getElementById('bottomnav').style.display='flex'; showTab('home'); }

/* ---------- Home path rendering ---------- */
function renderHome(){
  document.getElementById('streak-val').textContent = state.streak;
  document.getElementById('xp-val').textContent = state.xp;
  const container = document.getElementById('home-path');
  container.innerHTML = '';

  let currentUnitId = null, pathEl = null;
  LESSON_PLAN.forEach((node, idx)=>{
    if(node.unit.id !== currentUnitId){
      currentUnitId = node.unit.id;
      const block = document.createElement('div');
      block.className = 'unit-block';
      block.innerHTML = `<div class="unit-header"><h2>${node.unit.icon} ${node.unit.title}</h2><p>${node.unit.sub}</p></div><div class="path"></div>`;
      container.appendChild(block);
      pathEl = block.querySelector('.path');
    }
    const unlocked = idx === 0 || isNodeDone(LESSON_PLAN[idx-1].key);
    const stars = state.lessonStars[node.key] || 0;
    const done = stars >= 1;

    const nodeWrap = document.createElement('div');
    nodeWrap.className = 'path-node';
    const sub = node.isReview ? 'Practice everything in this unit'
              : node.newWords.map(w=>w.tr.split('/')[0].trim()).join(' · ');
    nodeWrap.innerHTML = `
      <button class="node ${node.isReview?'review':''} ${done?'done':''} ${unlocked?'':'locked'}">
        ${unlocked ? (done ? '✓' : (node.isReview?'🏆':node.unit.icon)) : '🔒'}
        ${stars>0?`<div class="stars">${'⭐'.repeat(stars)}</div>`:''}
      </button>
      <div class="node-label">${node.label}${unlocked?'<br><span style="font-weight:500">'+sub+'</span>':''}</div>
    `;
    if(unlocked){ nodeWrap.querySelector('.node').onclick = ()=>startLesson(node.key); }
    pathEl.appendChild(nodeWrap);
  });
}

/* ---------- Word bank ---------- */
function renderWordBank(){
  const list = document.getElementById('wordbank-list');
  list.innerHTML = '';
  const learned = learnedWordIds();
  UNITS.forEach(u=>{
    const h = document.createElement('div');
    h.className='section-title';
    h.textContent = `${u.icon} ${u.title}`;
    list.appendChild(h);
    u.words.forEach(w=>{
      const row = document.createElement('div');
      row.className='word-row' + (learned.has(w.id) ? '' : ' notlearned');
      row.innerHTML = `<div><div class="wa">${w.ar}</div><div class="wt">${w.tr}</div></div><div class="we">${w.en}</div><button class="mini-speak" aria-label="Play pronunciation">🔊</button>`;
      row.onclick = ()=>playWord(w);
      list.appendChild(row);
    });
  });
}

/* ---------- Audio: real recordings first, TTS fallback ----------
   Drop files named audio/<word id>.m4a into the repo (recorded by a
   real Lebanese speaker) and they play automatically. Missing files
   fall back to the phone's Arabic text-to-speech. */
const audioAvailability = {}; // id -> Audio | false
function playWord(word){
  if(audioAvailability[word.id] === false){ speakTTS(word.ar); return; }
  let a = audioAvailability[word.id];
  if(!a){
    a = new Audio('audio/' + word.id + '.m4a');
    audioAvailability[word.id] = a;
  }
  a.currentTime = 0;
  a.play().catch(()=>{
    audioAvailability[word.id] = false;
    speakTTS(word.ar);
  });
}
function speakTTS(text){
  try{
    if(!('speechSynthesis' in window)) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'ar-SA';
    u.rate = 0.85;
    const voices = window.speechSynthesis.getVoices();
    const arVoice = voices.find(v=>v.lang && v.lang.toLowerCase().startsWith('ar'));
    if(arVoice) u.voice = arVoice;
    window.speechSynthesis.speak(u);
  }catch(e){}
}
if('speechSynthesis' in window){ window.speechSynthesis.onvoiceschanged = ()=>{}; }

/* ---------- Exercise building ---------- */
function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){ const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}
function pickDistractors(word, pool, n){
  return shuffle(pool.filter(w=>w.id!==word.id)).slice(0,n);
}

/* Teaching lesson structure (Duolingo-style gentle ramp):
   - words are introduced 2 at a time with teach cards
   - right after each pair: EASY questions (2 choices) about just those words
   - after all words are taught: a mixed round with up to 4 choices
   Review lessons skip teaching and mix harder question types incl. typing. */
function buildExercises(node){
  const ex = [];
  if(!node.isReview){
    const words = node.newWords;
    for(let i=0; i<words.length; i+=2){
      const pair = words.slice(i, i+2);
      pair.forEach(w=>ex.push({type:'teach', word:w}));
      pair.forEach(w=>{
        // easy: 2 options, distractor drawn from words taught so far this lesson
        const taughtSoFar = words.slice(0, i+2);
        const pool = taughtSoFar.length>1 ? taughtSoFar : node.knownWords;
        ex.push({type:'mc_en', word:w, options: shuffle([w, ...pickDistractors(w, pool, 1)])});
        ex.push({type:'listen', word:w, options: shuffle([w, ...pickDistractors(w, pool, 1)])});
      });
    }
    // mixed round over the whole lesson, slightly harder (up to 4 options)
    shuffle(words).forEach((w, i)=>{
      const nOpts = Math.min(3, node.knownWords.length-1);
      if(i%2===0) ex.push({type:'mc_en', word:w, options: shuffle([w, ...pickDistractors(w, node.knownWords, nOpts)])});
      else ex.push({type:'mc_ar', word:w, options: shuffle([w, ...pickDistractors(w, node.knownWords, nOpts)])});
    });
    return ex; // teaching lessons keep intro order — no global shuffle
  }
  // review lesson: harder, all unit words, includes typing
  const words = shuffle(node.knownWords);
  words.forEach((w, i)=>{
    const nOpts = Math.min(3, node.knownWords.length-1);
    ex.push({type: i%2===0 ? 'mc_en' : 'mc_ar', word:w, options: shuffle([w, ...pickDistractors(w, node.knownWords, nOpts)])});
    if(i%3===0) ex.push({type:'listen', word:w, options: shuffle([w, ...pickDistractors(w, node.knownWords, nOpts)])});
    if(i%2===0) ex.push({type:'type', word:w});
  });
  return shuffle(ex);
}

/* ---------- Quiz session ---------- */
let session = null;

function startLesson(nodeKey){
  const node = LESSON_PLAN.find(n=>n.key===nodeKey);
  if(!node) return;
  const queue = buildExercises(node);
  session = {
    node,
    queue,
    pos:0,
    total: queue.length,
    quizTotal: queue.filter(q=>q.type!=='teach').length,
    correctCount:0,
    hearts:5,
    missed:[],
  };
  document.getElementById('bottomnav').style.display='none';
  showScreen('screen-lesson');
  renderExercise();
}
function exitLesson(){ if(confirm('End this lesson? Progress on it will be lost.')){ goHome(); } }

function updateHeaderBars(){
  const pct = Math.min(100, Math.round((session.pos/session.total)*100));
  document.getElementById('lesson-progress').style.width = pct+'%';
  document.getElementById('lesson-hearts').textContent = '❤️ '+session.hearts;
}

function renderExercise(){
  if(session.pos >= session.queue.length){
    if(session.missed.length){
      session.queue = session.missed;
      session.missed = [];
      session.pos = 0;
      session.total = session.queue.length;
    } else {
      finishLesson();
      return;
    }
  }
  updateHeaderBars();
  const item = session.queue[session.pos];
  const body = document.getElementById('quiz-body');
  document.getElementById('feedback-container').innerHTML = '';
  const checkBtn = document.getElementById('check-btn');
  checkBtn.textContent = 'CHECK';
  checkBtn.className = 'btn-primary';
  checkBtn.disabled = true;
  selectedOptionEl = null;

  if(item.type === 'teach'){
    body.innerHTML = `
      <div class="prompt-label">New word</div>
      <div class="teach-card">
        <div class="teach-badge">✨ NEW WORD</div>
        <div class="teach-arabic">${item.word.ar}</div>
        <div class="teach-translit">${item.word.tr}</div>
        <div class="teach-english">${item.word.en}</div>
        <button class="speak-btn" id="teach-speak" aria-label="Play pronunciation">🔊</button>
        <div class="teach-tip">Tap the speaker to hear it as many times as you like, then try saying it out loud!</div>
      </div>
    `;
    document.getElementById('teach-speak').onclick = ()=>playWord(item.word);
    playWord(item.word);
    checkBtn.textContent = 'GOT IT';
    checkBtn.className = 'btn-primary ready';
    checkBtn.disabled = false;
  } else if(item.type === 'mc_en'){
    body.innerHTML = `
      <div class="prompt-label">Select the correct meaning</div>
      <div class="prompt-main">
        <div class="prompt-row">
          <div class="arabic-big">${item.word.ar}</div>
          <button class="mini-speak" id="prompt-speak" aria-label="Play pronunciation">🔊</button>
        </div>
        <div class="translit">${item.word.tr}</div>
      </div>
      <div class="options" id="opts"></div>
    `;
    document.getElementById('prompt-speak').onclick = ()=>playWord(item.word);
    const opts = document.getElementById('opts');
    item.options.forEach(o=>{
      const el = document.createElement('div');
      el.className='option';
      el.textContent = o.en;
      el.onclick = ()=>selectOption(el, o===item.word);
      opts.appendChild(el);
    });
  } else if(item.type === 'mc_ar'){
    body.innerHTML = `
      <div class="prompt-label">Select the correct word</div>
      <div class="prompt-main"><div class="english-big">${item.word.en}</div></div>
      <div class="options" id="opts"></div>
    `;
    const opts = document.getElementById('opts');
    item.options.forEach(o=>{
      const el = document.createElement('div');
      el.className='option';
      el.innerHTML = `<span class="opt-text"><span style="direction:rtl;font-size:20px;">${o.ar}</span><span class="opt-sub">${o.tr}</span></span>`;
      const playBtn = document.createElement('button');
      playBtn.className='mini-speak';
      playBtn.setAttribute('aria-label','Play pronunciation');
      playBtn.textContent='🔊';
      playBtn.onclick = (e)=>{ e.stopPropagation(); playWord(o); };
      el.appendChild(playBtn);
      el.onclick = ()=>selectOption(el, o===item.word);
      opts.appendChild(el);
    });
  } else if(item.type === 'listen'){
    body.innerHTML = `
      <div class="prompt-label">Tap to listen, then choose the meaning</div>
      <div class="prompt-main" style="align-items:center; width:100%;">
        <button class="speak-btn" id="speak-btn" aria-label="Play pronunciation">🔊</button>
      </div>
      <div class="options" id="opts"></div>
    `;
    document.getElementById('speak-btn').onclick = ()=>playWord(item.word);
    playWord(item.word);
    const opts = document.getElementById('opts');
    item.options.forEach(o=>{
      const el = document.createElement('div');
      el.className='option';
      el.textContent = o.en;
      el.onclick = ()=>selectOption(el, o===item.word);
      opts.appendChild(el);
    });
  } else if(item.type === 'type'){
    body.innerHTML = `
      <div class="prompt-label">Type this word in Latin letters (transliteration)</div>
      <div class="prompt-main">
        <div class="prompt-row">
          <div class="arabic-big">${item.word.ar}</div>
          <button class="mini-speak" id="prompt-speak" aria-label="Play pronunciation">🔊</button>
        </div>
        <div class="translit">meaning: ${item.word.en}</div>
      </div>
      <input class="type-input" id="type-in" placeholder="type here..." autocapitalize="off" autocorrect="off" spellcheck="false">
      <div class="hint">Answers are flexible with spelling of sounds like 3, 7, 2 — just get close!</div>
    `;
    document.getElementById('prompt-speak').onclick = ()=>playWord(item.word);
    const input = document.getElementById('type-in');
    input.addEventListener('input', ()=>{ checkBtn.disabled = input.value.trim().length===0; });
    input.focus();
  }
}

let selectedOptionEl = null;
function selectOption(el, isCorrect){
  document.querySelectorAll('.option').forEach(o=>o.classList.remove('selected'));
  el.classList.add('selected');
  selectedOptionEl = el;
  el.dataset.correct = isCorrect ? '1':'0';
  document.getElementById('check-btn').disabled = false;
}

function normalize(str){
  return str.toLowerCase().replace(/[\/\-\s]+/g,'').trim();
}
function fuzzyMatch(input, answer){
  const a = normalize(input);
  const options = answer.split('/').map(s=>normalize(s));
  return options.some(o=> a===o || (a.length>2 && (o.includes(a)||a.includes(o))));
}

function onCheckOrNext(){
  const btn = document.getElementById('check-btn');
  const item = session.queue[session.pos];
  if(item && item.type === 'teach' && btn.textContent === 'GOT IT'){
    session.pos += 1;
    renderExercise();
    return;
  }
  if(btn.textContent === 'CHECK'){
    evaluateCurrent();
  } else {
    session.pos += 1;
    renderExercise();
  }
}

function evaluateCurrent(){
  const item = session.queue[session.pos];
  let correct = false;
  if(item.type === 'type'){
    const val = document.getElementById('type-in').value;
    correct = fuzzyMatch(val, item.word.tr);
  } else if(selectedOptionEl){
    correct = selectedOptionEl.dataset.correct === '1';
    document.querySelectorAll('.option').forEach(o=>{
      if(o===selectedOptionEl) o.classList.add(correct?'correct':'wrong');
    });
  }
  showFeedback(correct, item);
  if(correct){ session.correctCount++; }
  else {
    session.hearts = Math.max(0, session.hearts-1);
    // when Eva misses a word, re-teach it before re-quizzing it
    session.missed.push({type:'teach', word:item.word});
    session.missed.push(item);
  }
}

function showFeedback(correct, item){
  const fc = document.getElementById('feedback-container');
  const correctAnswerText = item.type==='type' ? item.word.tr : (item.type==='mc_ar'?`${item.word.ar} (${item.word.tr})`:item.word.en);
  fc.innerHTML = `
    <div class="feedback-banner ${correct?'ok':'bad'}">
      <div>${correct?'✅':'❌'}</div>
      <div>
        <div>${correct? 'Nice!' : 'Correct answer: '+correctAnswerText}</div>
        ${!correct?`<div class="feedback-sub">${item.word.ar} — ${item.word.tr} — ${item.word.en} (we'll see this one again!)</div>`:''}
      </div>
    </div>
  `;
  const btn = document.getElementById('check-btn');
  btn.textContent = 'CONTINUE';
  btn.className = 'btn-primary ' + (correct?'ready':'wrong-state');
  btn.disabled = false;
  document.querySelectorAll('.option').forEach(o=>o.style.pointerEvents='none');
}

function finishLesson(){
  const earned = session.correctCount * 10;
  state.xp += earned;
  bumpStreak();
  const prevStars = state.lessonStars[session.node.key] || 0;
  state.lessonStars[session.node.key] = Math.max(prevStars, session.hearts>=4?3:session.hearts>=2?2:1);
  saveState();

  document.getElementById('complete-xp').textContent = earned;
  document.getElementById('complete-acc').textContent = computeAccuracy()+'%';
  document.getElementById('complete-title').textContent = session.hearts>0 ? 'Lesson complete!' : 'Lesson complete — nice effort!';
  showScreen('screen-complete');
}
function computeAccuracy(){
  const denom = session.quizTotal || 1;
  const pct = Math.round((session.correctCount / denom) * 100);
  return Math.max(0, Math.min(100, pct));
}

/* ---------- Init ---------- */
renderHome();

if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
